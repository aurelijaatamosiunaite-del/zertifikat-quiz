<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is this certificate right for you? — Language & Society</title>
<style>
  :root{--ink:#404040;--muted:#6E6E6B;--accent:#E8420E;--accentbg:#FCEAE3;--line:#E4E0D8;--paper:#FFFFFF;--bg:#F5F3EF;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Helvetica,sans-serif;background:var(--bg);
       color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
  .card{background:var(--paper);width:min(640px,100%);border-radius:18px;border:1px solid var(--line);
        box-shadow:0 18px 50px rgba(64,64,64,.14);overflow:hidden;}
  .top{padding:20px 24px 0;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand img{width:46px;height:auto;}
  .brand .wm{font-size:19px;font-weight:800;color:var(--ink);line-height:1.05;}
  .brand .wm small{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;margin-top:2px;text-transform:uppercase;}
  .prog{display:flex;gap:6px;margin-top:18px;}
  .prog span{height:6px;flex:1;background:#E7E3DB;border-radius:4px;transition:.3s;}
  .body{padding:22px 24px 26px;}
  .qn{color:var(--accent);font-weight:800;font-size:13px;letter-spacing:.04em;text-transform:uppercase;}
  .q{font-size:20px;font-weight:800;line-height:1.3;margin-top:8px;color:var(--ink);}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:18px;}
  .opt{background:#fff;border:1.5px solid var(--line);border-radius:13px;padding:13px 16px;font-size:16px;
       cursor:pointer;text-align:left;transition:.15s;font-weight:600;color:var(--ink);line-height:1.35;}
  .opt:hover{border-color:var(--accent);}
  .opt.sel{background:var(--accent);border-color:var(--accent);color:#fff;}
  .nav{margin-top:22px;display:flex;justify-content:space-between;align-items:center;}
  .back{background:none;border:none;color:var(--muted);font-weight:700;font-size:14px;cursor:pointer;}
  .back[disabled]{visibility:hidden;}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:30px;padding:12px 26px;font-size:15px;
       font-weight:800;cursor:pointer;transition:.15s;}
  .btn:hover{filter:brightness(1.05);} .btn[disabled]{opacity:.35;cursor:default;}
  .res{display:none;padding:24px;}
  .res.show{display:block;}
  .badge{display:inline-block;color:#fff;font-weight:800;font-size:12px;letter-spacing:.08em;
         text-transform:uppercase;padding:6px 14px;border-radius:30px;}
  .res h2{font-size:25px;color:var(--ink);margin-top:14px;line-height:1.2;}
  .res .lead{font-size:15.5px;color:var(--muted);margin-top:10px;line-height:1.55;}
  .meter{display:flex;gap:5px;margin-top:16px;}
  .meter span{height:9px;flex:1;border-radius:5px;background:#E7E3DB;}
  .facts{background:#FAF7F2;border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:18px;
         font-size:14px;line-height:1.55;color:var(--ink);}
  .facts .row{display:flex;gap:9px;margin-bottom:8px;align-items:flex-start;}
  .facts .row:last-child{margin-bottom:0;}
  .facts .ic{color:var(--accent);font-weight:800;}
  .cta{margin-top:16px;text-align:center;font-size:14.5px;color:var(--ink);}
  .cta a{color:var(--accent);font-weight:800;text-decoration:none;}
  .again{margin-top:16px;background:none;border:1.5px solid var(--line);color:var(--muted);border-radius:30px;
         padding:9px 20px;font-weight:700;cursor:pointer;font-size:14px;}
  .foot{text-align:center;font-size:11px;color:#A7A39B;padding:0 24px 16px;}
</style>
</head>

<script>
const RB=["#781878","#00A8D8","#00A818","#F0A800","#F03000"];
const T={"lang": "en", "title": "Is this certificate right for you? — Language & Society", "wm": "Sprache und Gesellschaft", "kick": "JGU Certificate · Language & Society · 10 ECTS", "foot": "Certificate “Language & Society” · Languages of Northern Europe & the Baltic · JGU Mainz", "qword": "Question", "back": "← Back", "next": "Next →", "see": "My result →", "again": "↺ Start over", "bands": [{"tag": "Strong match", "color": "#00A818", "title": "This certificate is calling your name.", "lead": "Your answers show real curiosity about language, society and what happens between the lines – exactly what this certificate is built for. You'd feel right at home here."}, {"tag": "Good match", "color": "#E8420E", "title": "Sounds like a hit – take a closer look.", "lead": "The themes clearly speak to you. This could be just the addition that makes your profile distinctive. Come by the stand and find out what grabs you most."}, {"tag": "Maybe a hidden gem", "color": "#00A8D8", "title": "Possibly a surprising find for you.", "lead": "Not an obvious yes from your answers – but many students surprise themselves once they see real examples. A quick chat at our stand might be worth more than you'd expect."}], "facts": ["<b>10 ECTS, one semester.</b> You take 2 foundation courses + 1 in-depth course of your choice.", "<b>Mostly taught in English</b> – one course is in German.", "Assessment: active participation & short pieces + <b>one graded written assignment (a Seminararbeit).</b>", "Open to <b>M.A. students of any subject</b> (advanced B.A. if places remain).", "Apply for the winter semester via JOGU-StINe."], "cta": "Curious? Come talk to us at the stand &#183; <a href='mailto:kruse@uni-mainz.de'>kruse@uni-mainz.de</a>", "q": [{"q": "When a story about language shows up in your feed, you…", "o": [{"t": "… stop and read – this genuinely interests me.", "p": 2}, {"t": "… read on if the headline grabs me.", "p": 1}, {"t": "… usually keep scrolling.", "p": 0}]}, {"q": "“The way we function render(){

  let s=0; ans.forEach((a,k)=>s+=T.q[k].o[a].p);
  const max=T.q.length*2; const pct=s/max;
  let band; if(pct>=0.8)band=T.bands[0]; else if(pct>=0.4)band=T.bands[1]; else band=T.bands[2];
  const filled=Math.max(1,Math.round(pct*T.q.length));
  body.style.display='none';
  res.innerHTML=`<span class="badge" style="background:${band.color}">${band.tag}</span>
    <h2>${band.title}</h2>
    <div class="meter">${T.q.map((_,k)=>`<span style="background:${k<filled?band.color:'#E7E3DB'}"></span>`).join('')}</div>
    <p class="lead">${band.lead}</p>
    <div class="facts">${T.facts.map(f=>`<div class="row"><span class="ic">&#10003;</span><span>${f}</span></div>`).join('')}</div>
    <div class="cta">${T.cta}</div>
    <div style="text-align:center"><button class="again" id="again">${T.again}</button></div>`;
  res.classList.add('show');
  T.q.forEach((_,k)=>{document.getElementById('p'+k).style.background=RB[k%RB.length];});
  document.getElementById('again').onclick=()=>{i=0;for(let j=0;j<ans.length;j++)ans[j]=null;render();};
}
render();
</script>
</body>
</html>
